# Netlify configuration for scaletechnics.com

[build]
  publish = "."

# Redirect www to root
[[redirects]]
  from = "https://www.scaletechnics.com/*"
  to = "https://scaletechnics.com/:splat"
  status = 301
  force = true

# Custom headers for performance and security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# SPA-style fallback (if we add client-side routing later)
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200
