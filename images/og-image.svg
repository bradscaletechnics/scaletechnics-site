<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow1" cx="88%" cy="12%" r="50%">
      <stop offset="0%" stop-color="#c8ff00" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#c8ff00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="10%" cy="90%" r="40%">
      <stop offset="0%" stop-color="#c8ff00" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#c8ff00" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Glows -->
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle grid -->
  <line x1="400" y1="0" x2="400" y2="630" stroke="#161616" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="#161616" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#161616" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#161616" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="140" width="3" height="350" fill="#c8ff00" opacity="0.7"/>

  <!-- Logo — top left -->
  <text x="80" y="92" font-family="'Courier New', Courier, monospace" font-size="15" font-weight="500" fill="#f5f2ed" letter-spacing="5">SCALE</text>
  <text x="163" y="92" font-family="'Courier New', Courier, monospace" font-size="15" font-weight="700" fill="#c8ff00">.</text>
  <text x="174" y="92" font-family="'Courier New', Courier, monospace" font-size="15" font-weight="500" fill="#f5f2ed" letter-spacing="5">TECHNICS</text>

  <!-- Logo underline -->
  <line x1="80" y1="108" x2="330" y2="108" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Live indicator — top right -->
  <circle cx="1090" cy="82" r="5" fill="#c8ff00"/>
  <circle cx="1090" cy="82" r="10" fill="none" stroke="#c8ff00" stroke-width="1" opacity="0.35"/>
  <text x="1104" y="87" font-family="'Courier New', Courier, monospace" font-size="11" fill="#888888" letter-spacing="2.5">LIVE</text>

  <!-- Main headline -->
  <text x="80" y="248" font-family="Georgia, 'Times New Roman', Times, serif" font-size="88" font-weight="400" fill="#f5f2ed" letter-spacing="-2">Your business</text>
  <text x="80" y="356" font-family="Georgia, 'Times New Roman', Times, serif" font-size="88" font-weight="400" fill="#f5f2ed" font-style="italic" letter-spacing="-2">never</text>
  <text x="80" y="464" font-family="Georgia, 'Times New Roman', Times, serif" font-size="88" font-weight="400" fill="#c8ff00" font-style="italic" letter-spacing="-2">sleeps again.</text>

  <!-- Right side: Network nodes -->
  <g opacity="0.18">
    <circle cx="1010" cy="160" r="5" fill="#c8ff00"/>
    <circle cx="1110" cy="210" r="3.5" fill="#c8ff00"/>
    <circle cx="1060" cy="290" r="6" fill="#c8ff00"/>
    <circle cx="1130" cy="360" r="3.5" fill="#c8ff00"/>
    <circle cx="990"  cy="420" r="5" fill="#c8ff00"/>
    <circle cx="1090" cy="470" r="3.5" fill="#c8ff00"/>
    <circle cx="1040" cy="540" r="4" fill="#c8ff00"/>

    <line x1="1010" y1="160" x2="1110" y2="210" stroke="#c8ff00" stroke-width="1"/>
    <line x1="1110" y1="210" x2="1060" y2="290" stroke="#c8ff00" stroke-width="1"/>
    <line x1="1060" y1="290" x2="1130" y2="360" stroke="#c8ff00" stroke-width="1"/>
    <line x1="1130" y1="360" x2="990"  y2="420" stroke="#c8ff00" stroke-width="1"/>
    <line x1="990"  y1="420" x2="1090" y2="470" stroke="#c8ff00" stroke-width="1"/>
    <line x1="1090" y1="470" x2="1040" y2="540" stroke="#c8ff00" stroke-width="1"/>

    <line x1="1010" y1="160" x2="1060" y2="290" stroke="#c8ff00" stroke-width="0.5" stroke-dasharray="5,5"/>
    <line x1="1110" y1="210" x2="1130" y2="360" stroke="#c8ff00" stroke-width="0.5" stroke-dasharray="5,5"/>
    <line x1="1060" y1="290" x2="990"  y2="420" stroke="#c8ff00" stroke-width="0.5" stroke-dasharray="5,5"/>
    <line x1="990"  y1="420" x2="1040" y2="540" stroke="#c8ff00" stroke-width="0.5" stroke-dasharray="5,5"/>
  </g>

  <!-- Bottom divider -->
  <line x1="0" y1="590" x2="1200" y2="590" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Bottom left: tagline -->
  <text x="80" y="616" font-family="'Courier New', Courier, monospace" font-size="12" fill="#555555" letter-spacing="2">AUTONOMOUS AI INFRASTRUCTURE · VANCOUVER, BC</text>

  <!-- Bottom right: domain -->
  <text x="1120" y="616" font-family="'Courier New', Courier, monospace" font-size="12" fill="#c8ff00" letter-spacing="1" text-anchor="end">scaletechnics.com</text>
</svg>
