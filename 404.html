<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — Scale Technics AI Solutions</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/main.css">
<link rel="icon" href="/images/favicon.svg" type="image/svg+xml">
<style>
  .error-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 120px 24px;
    position: relative;
    overflow: hidden;
  }
  .error-wrap::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -60%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(200,255,0,0.04) 0%, transparent 70%);
    pointer-events: none;
  }
  .error-inner {
    text-align: center;
    max-width: 520px;
    position: relative; z-index: 2;
  }
  .error-code {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(80px, 15vw, 160px);
    font-weight: 400;
    color: var(--gray-2);
    line-height: 1;
    margin-bottom: 8px;
    letter-spacing: -4px;
  }
  .error-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
  }
  .error-inner h1 {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 400;
    line-height: 1.1;
    margin-bottom: 16px;
    letter-spacing: -1px;
  }
  .error-inner h1 em { font-style: italic; color: var(--accent); }
  .error-inner p {
    font-size: 17px;
    color: var(--gray-4);
    line-height: 1.6;
    margin-bottom: 40px;
  }
  .error-actions {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 48px;
  }
  .error-links {
    display: flex;
    gap: 32px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .error-links a {
    font-size: 14px;
    color: var(--gray-3);
    text-decoration: none;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .error-links a:hover { color: var(--white); }
  .error-links a::before { content: '→'; color: var(--accent); font-size: 12px; }
</style>
</head>
<body>

<!-- ═══ NAVIGATION ═══ -->
<nav id="navbar">
  <div class="container">
    <a href="/" class="logo">Scale<span>.</span>Technics</a>
    <div class="nav-links">
      <a href="/pages/services.html">Services</a>
      <a href="/pages/case-studies.html">Case Studies</a>
      <a href="/pages/about.html">About</a>
      <a href="/pages/contact.html" class="nav-cta">Book a Walkthrough</a>
    </div>
    <button class="mobile-toggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<div class="error-wrap">
  <div class="error-inner">
    <div class="error-code">404</div>
    <div class="error-tag">Page Not Found</div>
    <h1>This page doesn't<br><em>exist.</em></h1>
    <p>The page you're looking for has moved, been deleted, or never existed. The agents checked everywhere.</p>
    <div class="error-actions">
      <a href="/" class="btn-primary">Back to Home <span>→</span></a>
      <a href="/pages/contact.html" class="btn-secondary">Book a Walkthrough</a>
    </div>
    <div class="error-links">
      <a href="/pages/services.html">Services</a>
      <a href="/pages/case-studies.html">Case Studies</a>
      <a href="/pages/about.html">About</a>
    </div>
  </div>
</div>

<script src="/js/main.js"></script>
</body>
</html>
